<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chimera local control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Local Control Panel</p>
        <h1>chimera host</h1>
        <p class="lede">Edit the local host config, inspect connection status, and keep the host pointed at the right backend.</p>
      </section>

      <section class="panel panel-status">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Status</p>
            <h2>Runtime</h2>
          </div>
          <button id="refresh-status" type="button">Refresh</button>
        </div>
        <div id="status-grid" class="status-grid"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>Config JSON</h2>
          </div>
          <button id="reload-config" type="button">Reload</button>
        </div>

        <form id="config-form" class="config-form">
          <label>
            Backend WebSocket URL
            <input id="wsUrl" name="wsUrl" type="text" required />
            <small class="field-note">Changing this requires a host restart.</small>
          </label>

          <div class="grid two-up">
            <label>
              Host ID
              <input id="hostId" name="hostId" type="text" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Username
              <input id="hostUsername" name="hostUsername" type="text" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
          </div>

          <div class="grid two-up">
            <label>
              Front Host
              <input id="frontHost" name="frontHost" type="text" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Front Port
              <input id="frontPort" name="frontPort" type="number" min="1" max="65535" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
          </div>

          <label>
            Library Paths
            <textarea id="seriesPaths" name="seriesPaths" rows="6" placeholder="One path per line"></textarea>
            <small class="field-note">Changing this requires a host restart.</small>
          </label>

          <div class="toggle-row">
            <label class="checkbox">
              <input id="monitorMemory" name="monitorMemory" type="checkbox" />
              <span>Enable memory metrics</span>
            </label>
          </div>

          <div class="grid metrics-grid">
            <label>
              Memory Interval Seconds
              <input id="memoryIntervalSeconds" name="memoryIntervalSeconds" type="number" min="1" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Cache Bytes
              <input id="cacheBytes" name="cacheBytes" type="number" min="0" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Cache Pages
              <input id="cachePages" name="cachePages" type="number" min="0" step="1" required />
              <small class="field-note">Maximum number of pages kept in the in-memory cache. Changing this requires a host restart.</small>
            </label>
            <label>
              Max Cacheable Page Bytes
              <input id="maxCacheablePageBytes" name="maxCacheablePageBytes" type="number" min="0" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Idle After Seconds
              <input id="idleAfterSeconds" name="idleAfterSeconds" type="number" min="0" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Initial Reconnect Delay
              <input id="initialReconnectDelaySeconds" name="initialReconnectDelaySeconds" type="number" min="1" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
            <label>
              Max Reconnect Delay
              <input id="maxReconnectDelaySeconds" name="maxReconnectDelaySeconds" type="number" min="1" step="1" required />
              <small class="field-note">Changing this requires a host restart.</small>
            </label>
          </div>

          <div class="action-row">
            <button class="primary" type="submit">Save config</button>
            <p id="save-message" class="save-message"></p>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
